name: maizu_sudoku
description: Maizu Sudoku production-ready Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  google_mobile_ads: ^6.0.0
  share_plus: ^11.0.0
  url_launcher: ^6.3.2
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
